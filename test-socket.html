<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket.io Notification Test</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; }
        .card { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 400px; }
        #notifications { list-style: none; padding: 0; }
        .notification { background: #e3f2fd; padding: 10px; border-radius: 4px; margin-bottom: 10px; border-left: 5px solid #2196f3; }
        h1 { font-size: 1.5rem; color: #333; }
        .status { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Socket.io Notifications</h1>
        <p>Status: <span id="status" style="color: red;">Disconnected</span></p>
        <p>Ready to receive real-time notifications!</p>
        <div id="notifications"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io('http://localhost:3000'); // Your PORT here
        const statusEl = document.getElementById('status');
        const notificationsEl = document.getElementById('notifications');

        socket.on('connect', () => {
            statusEl.innerText = 'Connected';
            statusEl.style.color = 'green';
            console.log('Connected to server with ID:', socket.id);
            
            // Join a test room common for this example
            socket.emit('join', 'test-user-123');
        });

        socket.on('notification', (data) => {
            console.log('Notification received:', data);
            const div = document.createElement('div');
            div.className = 'notification';
            div.innerHTML = `<strong>${data.title}</strong><br>${data.message}`;
            notificationsEl.prepend(div);
        });

        socket.on('disconnect', () => {
            statusEl.innerText = 'Disconnected';
            statusEl.style.color = 'red';
        });
    </script>
</body>
</html>
